name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (editable + pinned dev toolchain)
        run: python -m pip install -e . -r requirements-dev.txt
      - name: Generate frame fixtures
        run: python scripts/generate_frame_fixtures.py
      - name: Lint (ruff)
        run: ruff check src tests scripts
      - name: Type-check (mypy --strict)
        run: python -m mypy
      - name: Test (pytest, coverage gate)
        run: pytest --cov=toyproto --cov-report=term-missing --cov-fail-under=85
